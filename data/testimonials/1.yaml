text: "Bonnie and George are absolutely wonderful. They are always kind, caring, and truly love what they do. They have boarded and taken care of my dogs, often for a month at a time due to my travels, and I couldn't ask for better caregivers. My dogs are always happy, safe, and well care for when they're with them. I fully trust Bonnie and George and highly recommend them to anyone looking for loving and reliable pet boarding"
name: "Alenka N."
